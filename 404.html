<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Redirecting...</title>
		<script>
			const REDIRECT_KEY = 'app-spa-redirect';
			const BASE_PATH = '/';
			console.log('temp', BASE_PATH, REDIRECT_KEY);

			sessionStorage.setItem(
				REDIRECT_KEY,
				location.pathname + location.search + location.hash,
			);

			// Redirect to base React SPA
			location.replace(BASE_PATH);
		</script>
	</head>
	<body>
		<p>Redirecting to the main page...</p>
	</body>
</html>
